<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 - 성주대재보존회</title>
  <meta name="robots" content="noindex" />
  <style>
    .yd-admin-link-box {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 9999;
      background: #1C1A18;
      color: #F5F1E8;
      padding: 10px 16px;
      font-family: -apple-system, sans-serif;
      font-size: 13px;
      border-radius: 4px;
    }
    .yd-admin-link-box a { color: #A8915C; text-decoration: underline; }
  </style>
</head>
<body>
  <!-- 연등(초) 발원 게시판은 Decap CMS가 아닌 별도 관리 화면에서 관리합니다 -->
  <div class="yd-admin-link-box">
    연등(초) 발원 글 관리는 <a href="/admin/yeondeung.html">여기</a>에서 하실 수 있습니다.
  </div>

  <!-- Netlify Identity widget: 로그인/초대 처리 -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", (user) => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>

  <!-- Decap CMS (구 Netlify CMS) -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
