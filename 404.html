<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>페이지를 찾을 수 없습니다 | 성주대재보존회</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="shortcut icon" href="https://www.milinjong.or.kr/favicon.ico" type="image/x-icon">
<style>
  .error-page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: var(--space-4);
  }
  .error-page .code {
    font-family: var(--font-display);
    font-size: 5rem;
    color: var(--gold);
  }
  .error-page h1 {
    font-size: 1.5rem;
    margin: var(--space-2) 0 var(--space-3);
  }
  .error-page p {
    color: var(--stone);
    margin-bottom: var(--space-4);
  }
</style>
</head>
<body>
  <div class="error-page">
    <p class="code">404</p>
    <h1>요청하신 페이지를 찾을 수 없습니다</h1>
    <p>주소를 다시 확인해 주시거나, 홈으로 돌아가 주세요.</p>
    <a href="index.html" class="btn btn-primary">홈으로 돌아가기</a>
  </div>
</body>
</html>
